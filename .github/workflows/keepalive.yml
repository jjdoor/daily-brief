name: Keepalive

on:
  schedule:
    - cron: '0 0 1 * *'  # 每月1日 UTC 00:00 执行
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Commit to keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u)" > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive $(date -u +%Y-%m)"
          git push
